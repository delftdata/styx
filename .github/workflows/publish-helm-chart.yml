name: Publish Helm Chart

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username ${{ github.repository_owner }} --password-stdin

      - name: Determine chart version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            CHART_VERSION=$(grep '^version:' charts/styx-cluster/Chart.yaml | awk '{print $2}')
            SHA="${{ github.sha }}"
            VERSION="${CHART_VERSION}-${SHA:0:7}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build chart dependencies
        run: helm dependency build charts/styx-cluster

      - name: Package Helm chart
        run: helm package charts/styx-cluster --version ${{ steps.version.outputs.version }} --destination /tmp/helm

      - name: Push Helm chart to GHCR
        run: |
          helm push /tmp/helm/styx-stack-${{ steps.version.outputs.version }}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}

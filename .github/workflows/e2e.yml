name: e2e

on:
  pull_request:
  push:
    branches: ["main"]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-base:
    name: "E2E — base (non-migration)"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker info
        run: |
          docker version
          docker compose version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools Cython
          cd styx-package && python setup.py build_ext --inplace && cd ..
          python -m pip install -r requirements.txt
          python -m pip install -e styx-package/

      - name: Make scripts executable
        run: |
          chmod +x scripts/start_styx_cluster.sh scripts/stop_styx_cluster.sh || true

      - name: Set DOCKER_HOST_IP
        run: echo "DOCKER_HOST_IP=127.0.0.1" >> $GITHUB_ENV

      - name: Run non-migration e2e tests
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          pytest tests/e2e/ -m "e2e" -q

      - name: Collect logs
        if: always()
        run: |
          mkdir -p artifacts
          if [ -d logs ]; then cp -r logs artifacts/; fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-base-artifacts
          path: artifacts
          if-no-files-found: ignore

  e2e-migration:
    name: "E2E — migration"
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker info
        run: |
          docker version
          docker compose version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools Cython
          cd styx-package && python setup.py build_ext --inplace && cd ..
          python -m pip install -r requirements.txt
          python -m pip install -e styx-package/

      - name: Make scripts executable
        run: |
          chmod +x scripts/start_styx_cluster.sh scripts/stop_styx_cluster.sh || true

      - name: Set DOCKER_HOST_IP
        run: echo "DOCKER_HOST_IP=127.0.0.1" >> $GITHUB_ENV

      - name: Run migration e2e tests
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          pytest tests/e2e/ -m "e2e_migration" -q

      - name: Collect logs
        if: always()
        run: |
          mkdir -p artifacts
          if [ -d logs ]; then cp -r logs artifacts/; fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-migration-artifacts
          path: artifacts
          if-no-files-found: ignore

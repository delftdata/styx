name: unit-tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  unit-tests-coordinator:
    name: Unit tests (coordinator)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install styx-package/.
          python -m pip install -r coordinator/requirements.txt
          python -m pip install pytest==9.0.2 pytest-cov

      - name: Run coordinator unit tests
        run: pytest tests/unit/coordinator/ -v --cov=. --cov-report=xml:coverage-coordinator.xml

      - name: Upload coordinator coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage-coordinator.xml
          flags: coordinator
          token: ${{ secrets.CODECOV_TOKEN }}

  unit-tests-worker:
    name: Unit tests (worker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install styx-package/.
          python -m pip install msgspec pytest==9.0.2 pytest-cov

      - name: Run worker unit tests
        run: pytest tests/unit/worker/ -v --cov=. --cov-report=xml:coverage-worker.xml

      - name: Upload worker coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage-worker.xml
          flags: worker
          token: ${{ secrets.CODECOV_TOKEN }}
